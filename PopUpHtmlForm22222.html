<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register Modal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

    <!-- MODAL BACKDROP -->
    <div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center">

        <!-- MODAL BOX -->
        <div class="w-[850px] bg-white rounded-2xl shadow-2xl flex overflow-hidden relative">

            <!-- LEFT PANEL -->
            <div
                class="w-1/2 bg-gradient-to-br from-blue-700 to-blue-500 text-white flex flex-col justify-center items-center p-12">

                <h1 class="text-4xl font-bold mb-6">Register</h1>

                <p class="text-center text-blue-100 leading-relaxed max-w-xs">
                    Enter your details to create your account and start accessing all
                    features of our platform. Join thousands of users today.
                </p>

                <div class="mt-10 space-y-3 text-sm text-blue-100">
                    <p>✔ Secure Registration</p>
                    <p>✔ Fast Account Setup</p>
                    <p>✔ Access Premium Features</p>
                </div>

            </div>


            <!-- RIGHT PANEL -->
            <div class="w-1/2 p-10">

                <!-- CLOSE BUTTON -->
                <button class="absolute top-5 right-6 text-gray-400 hover:text-red-500 text-xl">
                    ✕
                </button>

                <h3 class="text-sm tracking-widest text-gray-500 uppercase mb-8">
                    Enter Your Details
                </h3>

                <form class="space-y-5">

                    <input type="text" placeholder="Enter Full Name"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />

                    <input type="text" placeholder="Mobile Number"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />

                    <input type="email" placeholder="Email"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />

                    <input type="password" placeholder="Create Password"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />

                    <input type="password" placeholder="Confirm Password"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />

                    <button
                        class="w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white py-3 rounded-lg font-medium hover:from-blue-700 hover:to-blue-600 transition duration-300 shadow-md">
                        Register
                    </button>

                </form>

                <p class="text-xs text-gray-400 text-center mt-6">
                    By registering, you agree to our Terms & Conditions and Privacy Policy
                </p>

            </div>

        </div>

    </div>

</body>

</html>
